services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: uwcopilot
      POSTGRES_USER: uw
      POSTGRES_PASSWORD: uwpass
    ports:
      - "5433:5432"
    volumes:
      - uw_test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uw -d uwcopilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: uw
      RABBITMQ_DEFAULT_PASS: uwpass
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/uwcopilot?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: uw
      SPRING_DATASOURCE_PASSWORD: uwpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: uw
      SPRING_RABBITMQ_PASSWORD: uwpass
      UW_AI_WORKER_HEALTH_URL: http://mock-ai-worker:8001/health
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  mock-ai-worker:
    build: ./mock-ai-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://uw:uwpass@rabbitmq:5672/
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      USE_REAL_LLM: ${USE_REAL_LLM:-false}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  uw_test_pgdata:
